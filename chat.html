<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاموس الاختصارات الكورية | K-slang</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        :root {
            --pink-deep: #d63384;
            --pink-dark: #c2185b;
            --pink-medium: #e91e63;
            --pink-surface: #fce4ec;
            --text: #4a0e2e;
            --accent: #d63384;
            --green: #4caf50;
            --orange: #ff9800;
            --blue: #2196F3;
            --glass-white: rgba(255, 255, 255, 0.75);
            --glass-pink: rgba(245, 210, 220, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f8bbd0 0%, #f48fb1 30%, #f06292 60%, #ec407a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: clamp(12px, 2vw, 20px) 10px;
            overflow-x: hidden;
        }

        .app-screen {
            width: 100%;
            max-width: 500px;
            min-height: 92vh;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 40px rgba(200, 50, 80, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        @media (max-width: 520px) {
            .app-screen {
                max-width: 100%;
                min-height: 100vh;
                border-radius: 0;
            }
        }

        /* الهيدر */
        .app-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(236, 64, 122, 0.25);
            flex-shrink: 0;
            gap: 8px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(236, 64, 122, 0.3);
            color: var(--text);
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(200, 50, 80, 0.1);
        }

        .app-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
        }

        .header-btns {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(236, 64, 122, 0.3);
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
            color: var(--text);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(200, 50, 80, 0.15);
        }

        .icon-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--pink-dark);
            color: #fff;
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 9px;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }

        /* شريط البحث */
        .search-overlay {
            display: none;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(236, 64, 122, 0.25);
            flex-shrink: 0;
            animation: slideDown 0.2s ease;
        }

        .search-overlay.active {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid rgba(236, 64, 122, 0.3);
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            color: var(--text);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--pink-deep);
            background: rgba(255, 255, 255, 0.95);
        }

        .search-input::placeholder {
            color: #c48095;
        }

        .search-close-btn {
            background: rgba(236, 64, 122, 0.15);
            border: 1px solid rgba(236, 64, 122, 0.3);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text);
        }

        .search-results-count {
            text-align: center;
            font-size: 10px;
            color: #a06070;
            margin-top: 4px;
        }

        /* شريط التنقل */
        .top-nav {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(236, 64, 122, 0.25);
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding: 8px 0;
        }

        .top-nav::-webkit-scrollbar { display: none; }

        .nav-track {
            display: flex;
            gap: 8px;
            padding: 0 16px;
            width: max-content;
        }

        .nav-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            color: #7a4a5a;
            font-weight: 700;
            font-size: 12px;
            border: 1px solid rgba(236, 64, 122, 0.2);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.9);
            color: var(--pink-dark);
            border-color: var(--pink-deep);
            font-weight: 900;
            box-shadow: 0 2px 10px rgba(200, 50, 80, 0.15);
        }

        .nav-badge {
            background: rgba(236, 64, 122, 0.2);
            color: var(--pink-dark);
            border-radius: 10px;
            padding: 2px 7px;
            font-size: 10px;
            font-weight: 700;
        }

        .nav-item.active .nav-badge {
            background: var(--pink-deep);
            color: #fff;
        }

        /* المحتوى */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 12px 14px 20px;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar { width: 4px; }
        .content-area::-webkit-scrollbar-thumb {
            background: rgba(236, 64, 122, 0.3);
            border-radius: 10px;
        }

        .section-title {
            text-align: center;
            font-size: 15px;
            font-weight: 900;
            color: var(--text);
            margin: 6px 0 14px;
        }

        .section-title::before,
        .section-title::after {
            content: '✦';
            margin: 0 6px;
            color: var(--pink-deep);
            font-size: 10px;
        }

        .level-section {
            display: none;
        }

        .level-section.active {
            display: block;
        }

        /* شاشة المحفوظات والمتعلمة */
        .saved-screen {
            display: none;
        }

        .saved-screen.active {
            display: block;
        }

        .saved-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .saved-header h3 {
            font-size: 16px;
            color: var(--text);
        }

        .close-saved-btn {
            background: rgba(236, 64, 122, 0.15);
            border: 1px solid rgba(236, 64, 122, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: all 0.2s;
        }

        .close-saved-btn:hover {
            background: rgba(236, 64, 122, 0.25);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a06070;
            font-size: 15px;
        }

        .empty-state .emoji {
            font-size: 50px;
            display: block;
            margin-bottom: 12px;
        }

        /* عنصر الكلمة */
        .word-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 18px;
            border: 1px solid rgba(236, 64, 122, 0.2);
            transition: all 0.2s;
        }

        .word-item:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 2px 12px rgba(200, 50, 80, 0.08);
        }

        .word-item.learned {
            border-right: 3px solid var(--green);
            background: rgba(232, 245, 233, 0.7);
        }

        .word-item.saved {
            border-right: 3px solid var(--orange);
            background: rgba(255, 243, 224, 0.7);
        }

        .word-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .word-num {
            min-width: 24px;
            height: 24px;
            background: rgba(236, 64, 122, 0.15);
            color: var(--pink-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .cloud-wrap {
            flex-shrink: 0;
            cursor: pointer;
        }

        .cloud-shape {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 30px;
            padding: 8px 14px;
            min-width: 80px;
            text-align: center;
            border: 1px solid rgba(236, 64, 122, 0.2);
            transition: all 0.2s;
        }

        .cloud-shape:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.95);
        }

        .cloud-kr {
            font-size: 14px;
            font-weight: 900;
            color: var(--pink-dark);
            direction: ltr;
            display: block;
        }

        .cloud-sub {
            font-size: 9px;
            color: #a06070;
            font-weight: 600;
            display: block;
            margin-top: 1px;
            direction: ltr;
        }

        .word-ar {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
            flex: 1;
        }

        .example-box {
            background: rgba(252, 228, 236, 0.5);
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px dashed rgba(236, 64, 122, 0.25);
        }

        .example-label {
            font-size: 9px;
            color: #a06070;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .example-kr {
            font-size: 12px;
            font-weight: 700;
            color: var(--pink-dark);
            direction: ltr;
            text-align: right;
            margin-bottom: 2px;
        }

        .example-ar {
            font-size: 11px;
            color: #7a4a5a;
            font-weight: 500;
        }

        /* أزرار التفاعل */
        .word-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 6px 12px;
            border-radius: 15px;
            border: 1px solid rgba(236, 64, 122, 0.25);
            background: rgba(255, 255, 255, 0.75);
            font-size: 10px;
            font-weight: 700;
            color: #7a4a5a;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 1px 6px rgba(200, 50, 80, 0.1);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.save-btn.active {
            background: var(--orange);
            color: #fff;
            border-color: var(--orange);
        }

        .action-btn.learned-btn.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }

        .action-btn.pronounce-btn {
            color: var(--blue);
        }

        .action-btn.pronounce-btn.playing {
            background: var(--blue);
            color: #fff;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* رسائل */
        .no-results {
            text-align: center;
            padding: 30px;
            color: #a06070;
            font-size: 13px;
            font-weight: 700;
            display: none;
        }

        .no-results.show {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 14, 46, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 700;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-family: 'Tajawal', sans-serif;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/My-Korean-app/icon-192.png">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="تعلم الكورية">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app-screen">

    <!-- الهيدر -->
    <div class="app-header">
        <button class="back-btn" onclick="goBack()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            رجوع
        </button>
        <div class="app-title">🐰 K-Slang</div>
        <div class="header-btns">
            <button class="icon-btn" onclick="toggleSearch()" title="بحث">🔍</button>
            <button class="icon-btn" onclick="showSavedScreen('saved')" title="المحفوظات">
                ⭐
                <span class="badge" id="savedBadge" style="display:none">0</span>
            </button>
            <button class="icon-btn" onclick="showSavedScreen('learned')" title="المتعلمة">
                ✅
                <span class="badge" id="learnedBadge" style="display:none">0</span>
            </button>
        </div>
    </div>

    <!-- شريط البحث -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-input-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن كلمة أو اختصار..." autocomplete="off">
            <button class="search-close-btn" onclick="toggleSearch()">✕</button>
        </div>
        <div class="search-results-count" id="resultsCount"></div>
    </div>

    <!-- شريط التنقل -->
    <nav class="top-nav" id="mainNav">
        <div class="nav-track">
            <div class="nav-item active" data-level="all" onclick="switchLevel('all', this)">
                الكل <span class="nav-badge">134</span>
            </div>
            <div class="nav-item" data-level="1" onclick="switchLevel('1', this)">
                🟢 مبتدئ <span class="nav-badge">18</span>
            </div>
            <div class="nav-item" data-level="2" onclick="switchLevel('2', this)">
                🟡 متوسط <span class="nav-badge">20</span>
            </div>
            <div class="nav-item" data-level="3" onclick="switchLevel('3', this)">
                🔴 متقدم <span class="nav-badge">96</span>
            </div>
        </div>
    </nav>

    <!-- المحتوى الرئيسي -->
    <div class="content-area" id="mainContent">
        <div class="no-results" id="noResults">
            🐰💭<br>لم يتم العثور على نتائج
        </div>

        <div class="level-section active" id="levelSection1">
            <h2 class="section-title">المستوى الأول: الاختصارات الأساسية</h2>
            <div id="level1Content"></div>
        </div>
        <div class="level-section active" id="levelSection2">
            <h2 class="section-title">المستوى الثاني: عامية الإنترنت</h2>
            <div id="level2Content"></div>
        </div>
        <div class="level-section active" id="levelSection3">
            <h2 class="section-title">المستوى الثالث: مصطلحات اجتماعية وعاطفية</h2>
            <div id="level3Content"></div>
        </div>
    </div>

    <!-- شاشة المحفوظات / المتعلمة -->
    <div class="content-area saved-screen" id="savedScreen">
        <div class="saved-header">
            <h3 id="savedScreenTitle">⭐ الكلمات المحفوظة</h3>
            <button class="close-saved-btn" onclick="hideSavedScreen()">✕</button>
        </div>
        <div id="savedContent"></div>
    </div>
</div>

<script>
// ============ قاعدة البيانات الكاملة 134 كلمة ============
const wordsData = [
    { id: 1, level: 1, kr: 'ㅋㅋ', sub: '크크', ar: 'ضحك عادي (قهقهة).', exKr: '아, 진짜 웃겨 ㅋㅋ', exAr: 'آه، هذا مضحك حقاً هههه.' },
    { id: 2, level: 1, kr: 'ㅎㅎ', sub: '흐흐', ar: 'ضحك خفيف ولطيف.', exKr: '고마워 ㅎㅎ', exAr: 'شكراً لك (بضحكة لطيفة).' },
    { id: 3, level: 1, kr: '헐', sub: '', ar: 'صدمة أو تعجب شديد.', exKr: '헐! 이게 뭐야?', exAr: 'يا للهول! ما هذا؟' },
    { id: 4, level: 1, kr: '헉', sub: '', ar: 'شهقة فزع أو تفاجؤ مفاجئ.', exKr: '헉! 깜짝이야', exAr: 'آه! لقد أذهلتني.' },
    { id: 5, level: 1, kr: '어머', sub: '', ar: 'يا إلهي! / يا للدهشة!', exKr: '어머! 너무 예뻐', exAr: 'يا إلهي! هذا جميل جداً.' },
    { id: 6, level: 1, kr: '아이고', sub: '', ar: 'يا حسرتي / يا إلهي (تعب أو تعجب).', exKr: '아이고, 힘들어', exAr: 'يا حسرتي، أنا متعب.' },
    { id: 7, level: 1, kr: '소름', sub: '', ar: 'قشعريرة (من الخوف أو الاندهاش).', exKr: '소름 돋았어!', exAr: 'أصابتني قشعريرة!' },
    { id: 8, level: 1, kr: '닭살', sub: '', ar: 'قشعريرة (من الإحراج أو الكلام المعسول).', exKr: '닭살 돋는 말이야', exAr: 'هذا كلام يسبب القشعريرة.' },
    { id: 9, level: 1, kr: 'ㅜㅜ', sub: '우우', ar: 'تعبير عن الحزن أو الإحباط.', exKr: '비 와서 우울해 ㅜㅜ', exAr: 'المطر يجعلني مكتئباً.' },
    { id: 10, level: 1, kr: 'ㅠㅠ', sub: '유유', ar: 'بكاء شديد ودموع.', exKr: '보고 싶어 ㅠㅠ', exAr: 'أشتاق إليك (مع دموع).' },
    { id: 11, level: 1, kr: 'ㅇㅇ', sub: '응', ar: 'نعم / إيجاب.', exKr: 'ㅇㅇ 알겠어', exAr: 'نعم، فهمت.' },
    { id: 12, level: 1, kr: 'ㄴㄴ', sub: '노노', ar: 'لا / مستحيل (No No).', exKr: 'ㄴㄴ 안 돼', exAr: 'لا، هذا غير ممكن.' },
    { id: 13, level: 1, kr: 'ㅇㅋ', sub: '오케이', ar: 'أوكي / حسناً.', exKr: 'ㅇㅋ 내일 보자', exAr: 'أوكي، لنلتقِ غداً.' },
    { id: 14, level: 1, kr: 'ㄱㄱ', sub: '고고', ar: 'انطلق / هيا بنا (Go Go).', exKr: 'ㄱㄱ 빨리!', exAr: 'هيا بسرعة!' },
    { id: 15, level: 1, kr: 'ㅈㅅ', sub: '죄송', ar: 'آسف.', exKr: 'ㅈㅅ 늦었어', exAr: 'آسف، لقد تأخرت.' },

// ============ حالة التطبيق ============
let appState = {
    learned: JSON.parse(localStorage.getItem('kslang_learned') || '[]'),
    saved: JSON.parse(localStorage.getItem('kslang_saved') || '[]'),
    currentLevel: 'all',
    currentPlayingId: null
};

// ============ بناء المحتوى ============
function buildContent() {
    ['level1Content', 'level2Content', 'level3Content'].forEach((containerId, i) => {
        const container = document.getElementById(containerId);
        if (container) {
            const level = i + 1;
            container.innerHTML = wordsData.filter(w => w.level === level).map(w => createWordHTML(w)).join('');
        }
    });
    updateAllBadges();
}

function createWordHTML(w) {
    const isLearned = appState.learned.includes(w.id);
    const isSaved = appState.saved.includes(w.id);
    const itemClass = isLearned ? 'learned' : (isSaved ? 'saved' : '');

    return `
        <div class="word-item ${itemClass}" id="word-${w.id}">
            <div class="word-main">
                <div class="word-num">${w.id}</div>
                <div class="cloud-wrap">
                    <div class="cloud-shape" onclick="playPronunciation(${w.id}, '${w.kr.replace(/'/g, "\\'")}')">
                        <span class="cloud-kr">${w.kr}</span>
                        ${w.sub ? `<span class="cloud-sub">${w.sub}</span>` : ''}
                    </div>
                </div>
                <div class="word-ar">${w.ar}</div>
            </div>
            <div class="example-box">
                <div class="example-label">💬 مثال</div>
                <div class="example-kr">${w.exKr}</div>
                <div class="example-ar">${w.exAr}</div>
            </div>
            <div class="word-actions">
                <button class="action-btn save-btn ${isSaved ? 'active' : ''}" onclick="toggleSave(${w.id})">
                    ⭐ ${isSaved ? 'محفوظ' : 'حفظ'}
                </button>
                <button class="action-btn pronounce-btn" id="pronounceBtn${w.id}" onclick="playPronunciation(${w.id}, '${w.kr.replace(/'/g, "\\'")}')">
                    🔊 نطق
                </button>
                <button class="action-btn learned-btn ${isLearned ? 'active' : ''}" onclick="toggleLearned(${w.id})">
                    ✅ ${isLearned ? 'تمت' : 'تعلمت'}
                </button>
            </div>
        </div>
    `;
}

// ============ التبديل بين المستويات ============
function switchLevel(level, navItem) {
    appState.currentLevel = level;
    
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if (navItem) navItem.classList.add('active');
    
    document.querySelectorAll('.level-section').forEach(section => section.classList.remove('active'));
    
    if (level === 'all') {
        document.querySelectorAll('.level-section').forEach(section => section.classList.add('active'));
    } else {
        const section = document.getElementById(`levelSection${level}`);
        if (section) section.classList.add('active');
    }
}

// ============ البحث ============
function toggleSearch() {
    const overlay = document.getElementById('searchOverlay');
    const input = document.getElementById('searchInput');
    overlay.classList.toggle('active');
    if (overlay.classList.contains('active')) {
        setTimeout(() => input.focus(), 100);
    } else {
        input.value = '';
        showAllWords();
        updateResultsCount(134);
    }
}

document.getElementById('searchInput').addEventListener('input', function() {
    const term = this.value.trim();
    if (term) {
        applySearch(term);
    } else {
        showAllWords();
        updateResultsCount(134);
    }
});

function applySearch(term) {
    const lowerTerm = term.toLowerCase();
    let visibleCount = 0;
    
    wordsData.forEach(w => {
        const item = document.getElementById(`word-${w.id}`);
        if (!item) return;
        
        const searchText = (w.kr + ' ' + w.sub + ' ' + w.ar + ' ' + w.exKr + ' ' + w.exAr).toLowerCase();
        if (searchText.includes(lowerTerm)) {
            item.style.display = '';
            visibleCount++;
        } else {
            item.style.display = 'none';
        }
    });
    
    updateResultsCount(visibleCount);
    document.getElementById('noResults').classList.toggle('show', visibleCount === 0);
}

function showAllWords() {
    wordsData.forEach(w => {
        const item = document.getElementById(`word-${w.id}`);
        if (item) item.style.display = '';
    });
    document.getElementById('noResults').classList.remove('show');
}

function updateResultsCount(count) {
    const el = document.getElementById('resultsCount');
    el.textContent = count === 134 ? '' : `تم العثور على ${count} من 134 كلمة`;
}

// ============ الحفظ والتعلم (الكلمة تبقى في مكانها) ============
function toggleSave(id) {
    const idx = appState.saved.indexOf(id);
    if (idx > -1) {
        appState.saved.splice(idx, 1);
        showToast('🗑️ تمت إزالة الكلمة من المحفوظات');
    } else {
        appState.saved.push(id);
        showToast('⭐ تم حفظ الكلمة - يمكنك مشاهدتها في المحفوظات');
    }
    saveState();
    updateWordUIOnly(id);
    updateAllBadges();
}

function toggleLearned(id) {
    const idx = appState.learned.indexOf(id);
    if (idx > -1) {
        appState.learned.splice(idx, 1);
        showToast('🔄 تمت إعادة الكلمة للدراسة');
    } else {
        appState.learned.push(id);
        showToast('✅ أحسنت! تم نقلها إلى المتعلمة');
    }
    saveState();
    updateWordUIOnly(id);
    updateAllBadges();
}

// تحديث واجهة الكلمة فقط دون حذفها
function updateWordUIOnly(id) {
    const item = document.getElementById(`word-${id}`);
    if (!item) return;
    
    const isLearned = appState.learned.includes(id);
    const isSaved = appState.saved.includes(id);
    const itemClass = isLearned ? 'learned' : (isSaved ? 'saved' : '');
    
    item.className = `word-item ${itemClass}`;
    
    const saveBtn = item.querySelector('.save-btn');
    const learnedBtn = item.querySelector('.learned-btn');
    
    if (saveBtn) {
        saveBtn.className = `action-btn save-btn ${isSaved ? 'active' : ''}`;
        saveBtn.innerHTML = `⭐ ${isSaved ? 'محفوظ' : 'حفظ'}`;
    }
    if (learnedBtn) {
        learnedBtn.className = `action-btn learned-btn ${isLearned ? 'active' : ''}`;
        learnedBtn.innerHTML = `✅ ${isLearned ? 'تمت' : 'تعلمت'}`;
    }
}

function saveState() {
    localStorage.setItem('kslang_learned', JSON.stringify(appState.learned));
    localStorage.setItem('kslang_saved', JSON.stringify(appState.saved));
}

function updateAllBadges() {
    const savedBadge = document.getElementById('savedBadge');
    const learnedBadge = document.getElementById('learnedBadge');
    
    if (appState.saved.length > 0) {
        savedBadge.style.display = 'flex';
        savedBadge.textContent = appState.saved.length;
    } else {
        savedBadge.style.display = 'none';
    }
    
    if (appState.learned.length > 0) {
        learnedBadge.style.display = 'flex';
        learnedBadge.textContent = appState.learned.length;
    } else {
        learnedBadge.style.display = 'none';
    }
}

function resetAll() {
    if (confirm('مسح كل التقدم؟')) {
        appState.learned = [];
        appState.saved = [];
        saveState();
        buildContent();
        updateAllBadges();
        showToast('🔄 تم إعادة ضبط كل التقدم');
    }
}

// ============ شاشة المحفوظات والمتعلمة ============
function showSavedScreen(type) {
    const words = type === 'saved' ? 
        wordsData.filter(w => appState.saved.includes(w.id)) :
        wordsData.filter(w => appState.learned.includes(w.id));
    
    if (words.length === 0) {
        showToast(type === 'saved' ? '⚠️ لا توجد كلمات محفوظة' : '⚠️ لا توجد كلمات متعلمة');
        return;
    }
    
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('mainNav').style.display = 'none';
    document.getElementById('savedScreen').classList.add('active');
    
    document.getElementById('savedScreenTitle').innerHTML = type === 'saved' ? 
        '⭐ الكلمات المحفوظة' : '✅ الكلمات المتعلمة';
    
    document.getElementById('savedContent').innerHTML = words.map(w => createWordHTML(w)).join('');
}

function hideSavedScreen() {
    document.getElementById('mainContent').style.display = '';
    document.getElementById('mainNav').style.display = '';
    document.getElementById('savedScreen').classList.remove('active');
}

// ============ نظام الصوت ============
function playPronunciation(id, text) {
    stopAllAudio();

    const btn = document.getElementById(`pronounceBtn${id}`);
    if (btn) btn.classList.add('playing');
    appState.currentPlayingId = id;

    
    if (window.Android && typeof window.Android.speak === "function") {

        window.Android.speak(text);

        if (btn) btn.classList.remove('playing');
        appState.currentPlayingId = null;
        return;
    }

    
    if (window.speechSynthesis) {

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "ko-KR";
        utterance.rate = 0.75;
        utterance.pitch = 1;
        utterance.volume = 1;

        const voices = speechSynthesis.getVoices();
        const voice = voices.find(v => v.lang.indexOf("ko") === 0);
        if (voice) utterance.voice = voice;

        utterance.onend = function () {
            if (btn) btn.classList.remove('playing');
            appState.currentPlayingId = null;
        };

        utterance.onerror = function () {
            if (btn) btn.classList.remove('playing');
            appState.currentPlayingId = null;
        };

        speechSynthesis.speak(utterance);

    } else {

        if (btn) btn.classList.remove('playing');
        appState.currentPlayingId = null;
        showToast("⚠️ النطق غير مدعوم");

    }
    }

function stopAllAudio() {
    if ('speechSynthesis' in window) {
        try { window.speechSynthesis.cancel(); } catch(e) {}
    }
    const prevBtn = document.getElementById(`pronounceBtn${appState.currentPlayingId}`);
    if (prevBtn) prevBtn.classList.remove('playing');
    appState.currentPlayingId = null;
}

// تفعيل الصوت عند أول نقرة
document.addEventListener('click', function() {
    if ('speechSynthesis' in window) {
        speechSynthesis.getVoices();
    }
}, { once: true });

// ============ الإشعارات ============
let toastTimer;
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============ الرجوع ============
function goBack() {
    stopAllAudio();
    if (document.referrer && document.referrer.includes(window.location.host)) {
        history.back();
    } else {
        window.location.href = 'index.html';
    }
}

// ============ بدء التشغيل ============
buildContent();

// تحميل الأصوات
if ('speechSynthesis' in window) {
    speechSynthesis.onvoiceschanged = function() {
        speechSynthesis.getVoices();
    };
}
</script>
